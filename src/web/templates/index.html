{% extends "base.html" %}
{% block title %}PiClock — Dashboard{% endblock %}
{% block content %}
<div x-data="dashboard()" x-init="init()">
    <h1 class="text-2xl font-bold mb-6">Dashboard</h1>

    <!-- Active Alarm Banner -->
    <div x-show="activeAlarm" class="card mb-6 border-2 border-red-500 bg-red-900/30">
        <div class="flex items-center justify-between">
            <div>
                <span class="text-lg font-bold text-red-400">&#128276; Alarm Ringing!</span>
                <span class="ml-2 text-sm text-slate-300" x-text="activeAlarm?.label || 'Alarm'"></span>
                <span class="ml-2 text-xs text-slate-400" x-text="activeAlarm?.time || ''"></span>
            </div>
            <div class="flex gap-2">
                <button @click="snoozeAlarm()"
                        class="bg-yellow-600 hover:bg-yellow-700 text-white text-sm px-4 py-2 rounded">
                    Snooze 5 min
                </button>
                <button @click="dismissAlarm()"
                        class="bg-red-600 hover:bg-red-700 text-white text-sm px-4 py-2 rounded">
                    Dismiss
                </button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Status Card -->
        <div class="card">
            <h2 class="text-lg font-semibold mb-4">Status</h2>
            <div class="space-y-2 text-sm">
                <div class="flex justify-between">
                    <span class="text-slate-400">Active Clock Face</span>
                    <span class="font-medium" x-text="activeTheme"></span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400">Timezone</span>
                    <span class="font-medium" x-text="timezone"></span>
                </div>
            </div>
        </div>

        <!-- Quick Settings Card -->
        <div class="card">
            <h2 class="text-lg font-semibold mb-4">Quick Settings</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Clock Face</label>
                    <select x-model="selectedTheme" @change="activateTheme()"
                            class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm">
                        <template x-for="t in themes" :key="t">
                            <option :value="t" x-text="t" :selected="t === activeTheme"></option>
                        </template>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Timezone</label>
                    <select x-model="timezone" @change="selectTimezone()"
                            class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm">
                        <template x-for="tz in timezoneOptions" :key="tz.value">
                            <option :value="tz.value" x-text="tz.label" :selected="tz.value === timezone"></option>
                        </template>
                    </select>
                </div>
            </div>
        </div>

        <!-- Clock Preview -->
        <div class="card md:col-span-2 flex flex-col items-center">
            <h2 class="text-lg font-semibold mb-4">Preview</h2>
            <canvas id="clock-preview" width="360" height="360"></canvas>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/clock-preview.js') }}"></script>
<script>
function dashboard() {
    return {
        activeTheme: '{{ active_theme }}',
        timezone: '{{ timezone }}',
        themes: {{ themes | tojson }},
        selectedTheme: '{{ active_theme }}',
        themeData: null,
        timezoneOptions: [],
        activeAlarm: null,

        async init() {
            const tzResp = await fetch('/api/timezones');
            const tzList = await tzResp.json();
            this.timezoneOptions = tzList.map(tz => ({
                value: tz.name,
                label: tz.offset + ' \u2014 ' + tz.name,
            }));
            await this.loadTheme();
            startClockPreview('clock-preview', this.themeData, this.timezone);
            // Poll for active alarm
            this.pollAlarm();
            setInterval(() => this.pollAlarm(), 5000);
        },

        async loadTheme() {
            const resp = await fetch(`/api/themes/${this.activeTheme}`);
            this.themeData = await resp.json();
        },

        async selectTimezone() {
            await fetch('/api/settings', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ timezone: this.timezone }),
            });
            startClockPreview('clock-preview', this.themeData, this.timezone);
        },

        async activateTheme() {
            await fetch(`/api/themes/${this.selectedTheme}/activate`, { method: 'POST' });
            this.activeTheme = this.selectedTheme;
            await this.loadTheme();
            startClockPreview('clock-preview', this.themeData, this.timezone);
        },

        async pollAlarm() {
            try {
                const resp = await fetch('/api/alarms/active');
                const data = await resp.json();
                this.activeAlarm = data.active ? data.alarm : null;
            } catch { this.activeAlarm = null; }
        },

        async snoozeAlarm() {
            await fetch('/api/alarms/snooze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ delay: 300 }),
            });
            this.activeAlarm = null;
        },

        async dismissAlarm() {
            await fetch('/api/alarms/dismiss', { method: 'POST' });
            this.activeAlarm = null;
        },

    };
}
</script>
{% endblock %}
