<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PiClock3{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .card { background-color: #1e293b; border-radius: 0.75rem; padding: 1.5rem; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="bg-slate-800 border-b border-slate-700 px-6 py-3">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-white">&#128336; PiClock3</a>
            <div class="flex gap-4 text-sm">
                <a href="/" class="text-slate-300 hover:text-white">Dashboard</a>
                <a href="/themes" class="text-slate-300 hover:text-white">Themes</a>
                <a href="/alarms" class="text-slate-300 hover:text-white">Alarms</a>
                <a href="/agenda" class="text-slate-300 hover:text-white">Agenda</a>
                <a href="/clock" class="text-slate-300 hover:text-white">Clock</a>
            </div>
        </div>
    </nav>
    <main class="{% block main_class %}max-w-5xl{% endblock %} mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
