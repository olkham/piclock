<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PiClock{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .card { background-color: #1e293b; border-radius: 0.75rem; padding: 1.5rem; }
        /* Reusable toggle switch */
        .toggle-switch { position: relative; display: inline-flex; align-items: center; cursor: pointer; }
        .toggle-switch input { position: absolute; width: 0; height: 0; opacity: 0; }
        .toggle-track {
            width: 2.25rem; height: 1.25rem; border-radius: 9999px;
            background-color: #475569; transition: background-color 0.2s;
            position: relative;
        }
        .toggle-track::after {
            content: ''; position: absolute; top: 0.125rem; left: 0.125rem;
            width: 1rem; height: 1rem; border-radius: 9999px;
            background-color: #fff; transition: transform 0.2s;
        }
        .toggle-switch input:checked + .toggle-track { background-color: #2563eb; }
        .toggle-switch input:checked + .toggle-track::after { transform: translateX(1rem); }
    </style>
</head>
<body class="min-h-screen">
    <nav class="bg-slate-800 border-b border-slate-700 px-6 py-3">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2">
            <a href="/" class="text-xl font-bold text-white">&#128336; PiClock</a>
            <div class="flex flex-wrap items-center gap-4 text-sm">
                <a href="/" class="text-slate-300 hover:text-white">Dashboard</a>
                <a href="/themes" class="text-slate-300 hover:text-white">Clock Faces</a>
                <a href="/faces" class="text-slate-300 hover:text-white">Face Editor</a>
                <a href="/alarms" class="text-slate-300 hover:text-white">Alarms</a>
                <a href="/agenda" class="text-slate-300 hover:text-white">Agenda</a>
                <a href="/dial" class="text-slate-300 hover:text-white">Dial</a>
                <a href="/timer" class="text-slate-300 hover:text-white">Timer</a>
                <a href="/settings" class="text-slate-300 hover:text-white">Settings</a>
                <a href="/clock" class="text-slate-300 hover:text-white">Live View</a>
                <!-- Display Mode Switcher -->
                <div x-data="{ displayMode: 'clock' }"
                     x-init="fetch('/api/settings').then(r=>r.json()).then(d=>displayMode=d.display_mode||'clock')"
                     class="flex bg-slate-700 rounded-lg p-0.5 ml-2">
                    <button @click="displayMode='clock'; fetch('/api/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({display_mode:'clock'})})"
                            :class="displayMode==='clock' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'"
                            class="px-3 py-1 rounded-md text-xs font-medium transition-all duration-200">Clock</button>
                    <button @click="displayMode='dial'; fetch('/api/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({display_mode:'dial'})})"
                            :class="displayMode==='dial' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'"
                            class="px-3 py-1 rounded-md text-xs font-medium transition-all duration-200">Dial</button>
                    <button @click="displayMode='timer'; fetch('/api/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({display_mode:'timer'})})"
                            :class="displayMode==='timer' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'"
                            class="px-3 py-1 rounded-md text-xs font-medium transition-all duration-200">Timer</button>
                </div>
            </div>
        </div>
    </nav>
    <main class="{% block main_class %}max-w-5xl{% endblock %} mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
    <footer class="text-center text-xs text-slate-600 py-4" x-data="{ version: '' }" x-init="fetch('/api/version').then(r=>r.json()).then(d=>version=d.version)">
        PiClock <span x-text="version ? 'v' + version : ''"></span>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
