<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiClock — Live View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        body { display: flex; align-items: center; justify-content: center; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="clock-display"></canvas>

    <script src="{{ url_for('static', filename='js/clock-preview.js') }}"></script>
    <script>
    (function() {
        const canvas = document.getElementById('clock-display');
        let theme = null;
        let timezone = '{{ timezone }}';
        let activeTheme = '{{ active_theme }}';

        function resizeCanvas() {
            const size = Math.min(window.innerWidth, window.innerHeight);
            canvas.width = size;
            canvas.height = size;
            // Force static cache rebuild on resize
            _cachedThemeJSON = '';
            _staticCache = null;
        }

        async function loadSettings() {
            try {
                const [statusResp, themeResp] = await Promise.all([
                    fetch('/api/status'),
                    fetch(`/api/themes/${activeTheme}`)
                ]);
                const status = await statusResp.json();
                const newTheme = status.active_theme || activeTheme;

                if (newTheme !== activeTheme) {
                    activeTheme = newTheme;
                    const resp = await fetch(`/api/themes/${activeTheme}`);
                    theme = await resp.json();
                } else if (!theme) {
                    theme = await themeResp.json();
                }

                if (status.timezone && status.timezone !== timezone) {
                    timezone = status.timezone;
                    _previewTimezone = timezone;
                }
            } catch (e) {
                // Silently retry next poll
            }
        }

        async function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            await loadSettings();
            _previewTimezone = timezone;

            // Poll for setting changes every 5 seconds
            setInterval(() => loadSettings(), 5000);

            // Animation loop — render every frame for smooth second hand
            let lastSec = -1;
            function tick() {
                if (theme) {
                    const now = _getPreviewTime();
                    renderClock(canvas, theme, now);
                }
                requestAnimationFrame(tick);
            }
            tick();
        }

        init();
    })();
    </script>
</body>
</html>
