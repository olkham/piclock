{% extends "base.html" %}
{% block title %}PiClock — Timer{% endblock %}
{% block main_class %}max-w-4xl px-2 sm:px-4{% endblock %}
{% block content %}
<div x-data="timerManager()" x-init="init()">
    <h1 class="text-2xl font-bold mb-6">Timer</h1>

    <!-- Display Mode Banner -->
    <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 bg-slate-800 border border-slate-700 rounded-xl px-5 py-4">
        <div>
            <span class="text-sm text-slate-400">Active Display</span>
            <p class="text-xs text-slate-500 mt-0.5" x-text="displayMode === 'timer' ? 'The physical display is showing the timer.' : 'Switch to Timer mode to see the countdown on the display.'"></p>
        </div>
        <div class="flex bg-slate-700 rounded-lg p-0.5">
            <button @click="setMode('clock')"
                    :class="displayMode === 'clock' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'"
                    class="px-4 py-1.5 rounded-md text-sm font-medium transition-all duration-200">
                Clock
            </button>
            <button @click="setMode('dial')"
                    :class="displayMode === 'dial' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'"
                    class="px-4 py-1.5 rounded-md text-sm font-medium transition-all duration-200">
                Dial
            </button>
            <button @click="setMode('timer')"
                    :class="displayMode === 'timer' ? 'bg-blue-600 text-white shadow' : 'text-slate-400 hover:text-white'"
                    class="px-4 py-1.5 rounded-md text-sm font-medium transition-all duration-200">
                Timer
            </button>
        </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-6">

        <!-- Left: Controls -->
        <div class="flex-1 space-y-6">

            <!-- Set Duration -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-4">Duration</h2>
                <div class="grid grid-cols-3 gap-4 mb-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Hours</label>
                        <input type="number" x-model.number="hours" min="0" max="99" step="1"
                               :disabled="timer.running"
                               class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm text-center text-2xl disabled:opacity-50"
                               @change="updateDuration()">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Minutes</label>
                        <input type="number" x-model.number="minutes" min="0" max="59" step="1"
                               :disabled="timer.running"
                               class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm text-center text-2xl disabled:opacity-50"
                               @change="updateDuration()">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Seconds</label>
                        <input type="number" x-model.number="seconds" min="0" max="59" step="1"
                               :disabled="timer.running"
                               class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm text-center text-2xl disabled:opacity-50"
                               @change="updateDuration()">
                    </div>
                </div>
                <!-- Quick presets -->
                <div class="flex flex-wrap gap-2 mb-4">
                    <template x-for="p in presets" :key="p.label">
                        <button @click="setPreset(p.seconds)"
                                :disabled="timer.running"
                                class="bg-slate-600 hover:bg-slate-500 disabled:opacity-50 text-sm px-3 py-1.5 rounded transition-colors"
                                x-text="p.label"></button>
                    </template>
                </div>
            </div>

            <!-- Controls -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-4">Controls</h2>
                <div class="flex gap-3 mb-4">
                    <button @click="startTimer()" x-show="!timer.running && !timer.finished"
                            :disabled="timer.duration <= 0"
                            class="flex-1 bg-green-600 hover:bg-green-700 disabled:opacity-50 text-white font-medium py-2.5 rounded transition-colors">
                        Start
                    </button>
                    <button @click="stopTimer()" x-show="timer.running"
                            class="flex-1 bg-yellow-600 hover:bg-yellow-700 text-white font-medium py-2.5 rounded transition-colors">
                        Pause
                    </button>
                    <button @click="resumeTimer()" x-show="!timer.running && timer.remaining > 0 && !timer.finished"
                            class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 rounded transition-colors">
                        Resume
                    </button>
                    <button @click="dismissTimer()" x-show="timer.finished"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded transition-colors">
                        Dismiss
                    </button>
                    <button @click="resetTimer()"
                            class="bg-slate-600 hover:bg-slate-500 text-white font-medium py-2.5 px-4 rounded transition-colors">
                        Reset
                    </button>
                </div>

                <!-- Label -->
                <div class="mb-4">
                    <label class="block text-xs text-slate-400 mb-1">Label</label>
                    <input type="text" x-model="timer.label" @change="saveTimer()"
                           placeholder="e.g. Pizza, Laundry…"
                           class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm">
                </div>

                <!-- Sound -->
                <div class="mb-3">
                    <label class="block text-xs text-slate-400 mb-1">Sound</label>
                    <select x-model="timer.sound" @change="saveTimer()"
                            class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm">
                        <option value="default">Default</option>
                        <template x-for="s in sounds" :key="s">
                            <option :value="s" x-text="s"></option>
                        </template>
                    </select>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" x-model="timer.sound_enabled" @change="saveTimer()">
                    <div class="toggle-track"></div>
                    <span class="ml-2 text-sm">Enable sound</span>
                </label>
            </div>

            <!-- Dial Theme Selector -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-4">Visual Theme</h2>
                <div class="space-y-2">
                    <template x-for="t in dialThemes" :key="t">
                        <div class="flex items-center justify-between p-2 rounded cursor-pointer hover:bg-slate-600"
                             :class="{ 'bg-slate-600': activeDialTheme === t }"
                             @click="activateTheme(t)">
                            <span x-text="t" class="truncate"></span>
                            <span x-show="t === activeDialTheme" class="text-xs bg-blue-600 px-2 py-0.5 rounded flex-shrink-0">Active</span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Timer Display Styling -->
            <div class="card">
                <h2 class="text-lg font-semibold mb-4">Display Styling</h2>

                <!-- Label Text Section -->
                <button @click="showLabel = !showLabel" class="w-full flex items-center justify-between py-2 text-sm font-medium text-slate-300 hover:text-white">
                    <span>Label Text</span>
                    <svg :class="showLabel && 'rotate-180'" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div x-show="showLabel" x-collapse class="space-y-3 pb-4 border-b border-slate-700">
                    <label class="toggle-switch">
                        <input type="checkbox" x-model="timer.show_label" @change="saveTimer()">
                        <div class="toggle-track"></div>
                        <span class="ml-2 text-sm">Show label</span>
                    </label>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Vertical Position <span class="text-slate-500" x-text="'(' + (timer.label_offset_y ?? _themeDefault('label_offset_y', 8)) + '%)'"></span></label>
                        <input type="range" min="-50" max="50" step="1"
                               :value="timer.label_offset_y ?? _themeDefault('label_offset_y', 8)"
                               @input="timer.label_offset_y = +$event.target.value; saveTimer()"
                               class="w-full accent-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Font Size <span class="text-slate-500" x-text="(timer.label_font_size ?? 0) || 'auto'"></span></label>
                            <input type="range" min="0" max="60" step="1"
                                   :value="timer.label_font_size ?? 0"
                                   @input="timer.label_font_size = +$event.target.value || null; saveTimer()"
                                   class="w-full accent-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Color</label>
                            <input type="color"
                                   :value="timer.label_color ?? _themeDefault('label_color', '#888888')"
                                   @input="timer.label_color = $event.target.value; saveTimer()"
                                   class="w-full h-8 rounded bg-slate-700 border border-slate-600 cursor-pointer">
                        </div>
                    </div>
                    <button @click="timer.label_offset_y = null; timer.label_font_size = null; timer.label_color = null; saveTimer()"
                            class="text-xs text-slate-500 hover:text-slate-300 transition-colors">Reset to theme defaults</button>
                </div>

                <!-- Countdown (Digital Timer) Section -->
                <button @click="showTime = !showTime" class="w-full flex items-center justify-between py-2 text-sm font-medium text-slate-300 hover:text-white mt-2">
                    <span>Countdown Display</span>
                    <svg :class="showTime && 'rotate-180'" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div x-show="showTime" x-collapse class="space-y-3 pb-4 border-b border-slate-700">
                    <label class="toggle-switch">
                        <input type="checkbox" x-model="timer.show_time" @change="saveTimer()">
                        <div class="toggle-track"></div>
                        <span class="ml-2 text-sm">Show countdown</span>
                    </label>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Vertical Position <span class="text-slate-500" x-text="'(' + (timer.time_offset_y ?? _themeDefault('value_offset_y', 12)) + '%)'"></span></label>
                        <input type="range" min="-50" max="50" step="1"
                               :value="timer.time_offset_y ?? _themeDefault('value_offset_y', 12)"
                               @input="timer.time_offset_y = +$event.target.value; saveTimer()"
                               class="w-full accent-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Font Size <span class="text-slate-500" x-text="(timer.time_font_size ?? 0) || 'auto'"></span></label>
                            <input type="range" min="0" max="80" step="1"
                                   :value="timer.time_font_size ?? 0"
                                   @input="timer.time_font_size = +$event.target.value || null; saveTimer()"
                                   class="w-full accent-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Color</label>
                            <input type="color"
                                   :value="timer.time_color ?? _themeDefault('value_color', '#ffffff')"
                                   @input="timer.time_color = $event.target.value; saveTimer()"
                                   class="w-full h-8 rounded bg-slate-700 border border-slate-600 cursor-pointer">
                        </div>
                    </div>
                    <button @click="timer.time_offset_y = null; timer.time_font_size = null; timer.time_color = null; saveTimer()"
                            class="text-xs text-slate-500 hover:text-slate-300 transition-colors">Reset to theme defaults</button>
                </div>

                <!-- Alert Animation Section -->
                <button @click="showAlert = !showAlert" class="w-full flex items-center justify-between py-2 text-sm font-medium text-slate-300 hover:text-white mt-2">
                    <span>Alert Animation</span>
                    <svg :class="showAlert && 'rotate-180'" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </button>
                <div x-show="showAlert" x-collapse class="space-y-3 pb-2">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Animation Style</label>
                        <select x-model="timer.alert_shape" @change="saveTimer()"
                                class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm">
                            <option value="border_glow">Border Glow</option>
                            <option value="ring">Pulsing Ring</option>
                            <option value="flash">Full Flash</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Animation Speed</label>
                        <select x-model="timer.alert_speed" @change="saveTimer()"
                                class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm">
                            <option value="slow">Slow</option>
                            <option value="normal">Normal</option>
                            <option value="fast">Fast</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Alert Color</label>
                            <input type="color" x-model="timer.alert_color" @input="saveTimer()"
                                   class="w-full h-8 rounded bg-slate-700 border border-slate-600 cursor-pointer">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Label Position</label>
                            <select x-model="timer.alert_position" @change="saveTimer()"
                                    class="w-full bg-slate-700 border border-slate-600 rounded px-3 py-2 text-sm">
                                <option value="top">Top</option>
                                <option value="center">Center</option>
                                <option value="bottom">Bottom</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Preview -->
        <div class="w-full lg:w-96 flex-shrink-0 space-y-4">
            <!-- Countdown Display -->
            <div class="card text-center">
                <div class="text-5xl font-mono font-bold tracking-wider" x-text="formatTime(timer.remaining)"></div>
                <div class="text-sm text-slate-400 mt-2" x-text="timer.label || ''"></div>
                <div x-show="timer.finished" class="mt-2 text-orange-400 font-semibold animate-pulse">Timer Complete!</div>
            </div>
            <!-- Dial Preview -->
            <div class="card flex items-center justify-center">
                <canvas id="timerPreview" width="360" height="360" style="width:360px;height:360px;border-radius:50%;"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function timerManager() {
    return {
        displayMode: '{{ display_mode }}',
        dialThemes: {{ dial_themes | tojson }},
        activeDialTheme: '{{ active_dial_theme }}',
        sounds: [],
        timer: { duration: 0, remaining: 0, label: '', running: false, started_at: 0, finished: false, sound: 'default', sound_enabled: true,
                 show_label: true, label_offset_y: null, label_font_size: null, label_color: null,
                 show_time: true, time_offset_y: null, time_font_size: null, time_color: null,
                 alert_shape: 'border_glow', alert_color: '#ff9900', alert_speed: 'normal', alert_position: 'bottom' },
        hours: 0,
        minutes: 0,
        seconds: 0,
        presets: [
            { label: '1 min', seconds: 60 },
            { label: '3 min', seconds: 180 },
            { label: '5 min', seconds: 300 },
            { label: '10 min', seconds: 600 },
            { label: '15 min', seconds: 900 },
            { label: '30 min', seconds: 1800 },
            { label: '1 hr', seconds: 3600 },
        ],
        _previewCtx: null,
        _rafId: null,
        _animProgress: 100,
        _pollTimer: null,
        _dialTheme: null,
        _pollReceivedAt: 0,
        showLabel: true,
        showTime: true,
        showAlert: false,

        async init() {
            const [timerResp, settingsResp, soundsResp] = await Promise.all([
                fetch('/api/timer'),
                fetch('/api/settings'),
                fetch('/api/sounds'),
            ]);
            this.timer = await timerResp.json();
            this._pollReceivedAt = performance.now();
            const settings = await settingsResp.json();
            this.displayMode = settings.display_mode || 'clock';
            this.sounds = await soundsResp.json();

            // Decompose duration into H:M:S
            this._decomposeDuration(this.timer.duration);

            // Load active dial theme for preview
            await this._loadDialTheme(this.activeDialTheme);

            // Init canvas
            const canvas = document.getElementById('timerPreview');
            this._previewCtx = canvas.getContext('2d');
            this._animProgress = this._progressPct();
            this._startPreview();

            // Poll timer state while running
            this._startPolling();
        },

        _decomposeDuration(totalSeconds) {
            this.hours = Math.floor(totalSeconds / 3600);
            this.minutes = Math.floor((totalSeconds % 3600) / 60);
            this.seconds = totalSeconds % 60;
        },

        updateDuration() {
            const dur = (this.hours || 0) * 3600 + (this.minutes || 0) * 60 + (this.seconds || 0);
            this.timer.duration = dur;
            this.timer.remaining = dur;
            this.saveTimer();
        },

        setPreset(secs) {
            this.timer.duration = secs;
            this.timer.remaining = secs;
            this._decomposeDuration(secs);
            this.saveTimer();
        },

        async saveTimer() {
            await fetch('/api/timer', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    duration: this.timer.duration,
                    label: this.timer.label,
                    sound: this.timer.sound,
                    sound_enabled: this.timer.sound_enabled,
                    show_label: this.timer.show_label,
                    label_offset_y: this.timer.label_offset_y,
                    label_font_size: this.timer.label_font_size,
                    label_color: this.timer.label_color,
                    show_time: this.timer.show_time,
                    time_offset_y: this.timer.time_offset_y,
                    time_font_size: this.timer.time_font_size,
                    time_color: this.timer.time_color,
                    alert_shape: this.timer.alert_shape,
                    alert_color: this.timer.alert_color,
                    alert_speed: this.timer.alert_speed,
                    alert_position: this.timer.alert_position,
                }),
            });
        },

        _themeDefault(key, fallback) {
            if (!this._dialTheme) return fallback;
            const v = this._dialTheme.dial?.[key];
            return v != null ? v : fallback;
        },

        async startTimer() {
            const resp = await fetch('/api/timer/start', { method: 'POST' });
            if (resp.ok) {
                this.timer = await resp.json();
                this._pollReceivedAt = performance.now();
            }
        },

        async stopTimer() {
            const resp = await fetch('/api/timer/stop', { method: 'POST' });
            if (resp.ok) {
                this.timer = await resp.json();
                this._pollReceivedAt = performance.now();
            }
        },

        async resumeTimer() {
            // Re-start with current remaining as the new duration point
            const resp = await fetch('/api/timer/start', { method: 'POST' });
            if (resp.ok) {
                this.timer = await resp.json();
                this._pollReceivedAt = performance.now();
            }
        },

        async dismissTimer() {
            const resp = await fetch('/api/timer/dismiss', { method: 'POST' });
            if (resp.ok) {
                this.timer = this._defaultTimerState();
                this._decomposeDuration(0);
            }
        },

        async resetTimer() {
            await fetch('/api/timer/dismiss', { method: 'POST' });
            this.timer = this._defaultTimerState();
            this._decomposeDuration(0);
        },

        _defaultTimerState() {
            return {
                duration: 0, remaining: 0, label: '', running: false, started_at: 0, finished: false,
                sound: 'default', sound_enabled: true,
                show_label: true, label_offset_y: null, label_font_size: null, label_color: null,
                show_time: true, time_offset_y: null, time_font_size: null, time_color: null,
                alert_shape: 'border_glow', alert_color: '#ff9900', alert_speed: 'normal', alert_position: 'bottom',
            };
        },

        async setMode(mode) {
            this.displayMode = mode;
            await fetch('/api/settings', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ display_mode: mode }),
            });
        },

        async activateTheme(name) {
            const resp = await fetch('/api/dial-themes/' + encodeURIComponent(name) + '/activate', { method: 'POST' });
            if (resp.ok) {
                this.activeDialTheme = name;
                await this._loadDialTheme(name);
            }
        },

        async _loadDialTheme(name) {
            const resp = await fetch('/api/dial-themes/' + encodeURIComponent(name));
            if (resp.ok) {
                this._dialTheme = await resp.json();
            }
        },

        formatTime(totalSeconds) {
            const s = Math.max(0, Math.round(totalSeconds));
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            if (h > 0) {
                return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
            }
            return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
        },

        _progressPct() {
            if (this.timer.duration <= 0) return 0;
            let rem = this.timer.remaining;
            // Smooth interpolation: subtract fractional elapsed since last poll
            if (this.timer.running && rem > 0 && this._pollReceivedAt > 0) {
                const elapsed = (performance.now() - this._pollReceivedAt) / 1000;
                rem = Math.max(0, rem - elapsed);
            }
            return Math.max(0, Math.min(100, rem / this.timer.duration * 100));
        },

        _startPolling() {
            this._pollTimer = setInterval(async () => {
                if (!this.timer.running && !this.timer.finished) return;
                const resp = await fetch('/api/timer');
                if (resp.ok) {
                    this.timer = await resp.json();
                    this._pollReceivedAt = performance.now();
                }
            }, 1000);
        },

        // --- Preview rendering ---
        _startPreview() {
            const draw = () => {
                this._updateAnimation();
                this._drawPreview();
                this._rafId = requestAnimationFrame(draw);
            };
            draw();
        },

        _updateAnimation() {
            const target = this._progressPct();
            // When timer is running, track directly for smooth constant-velocity motion
            if (this.timer.running) {
                this._animProgress = target;
                return;
            }
            if (Math.abs(this._animProgress - target) < 0.1) {
                this._animProgress = target;
                return;
            }
            this._animProgress += (target - this._animProgress) * 0.12;
        },

        _drawPreview() {
            const ctx = this._previewCtx;
            if (!ctx || !this._dialTheme) return;
            const a = this._dialTheme.dial || {};
            const bg = this._dialTheme.background || {};
            const size = 360;
            const center = size / 2;
            const dpr = window.devicePixelRatio || 1;
            const canvas = ctx.canvas;
            if (canvas.width !== size * dpr) {
                canvas.width = size * dpr;
                canvas.height = size * dpr;
                canvas.style.width = size + 'px';
                canvas.style.height = size + 'px';
                ctx.scale(dpr, dpr);
            }

            ctx.clearRect(0, 0, size, size);
            ctx.save();
            ctx.beginPath();
            ctx.arc(center, center, center, 0, Math.PI * 2);
            ctx.clip();

            // --- Background from dial theme ---
            const bgType = bg.type || 'solid';
            const colorOpacity = (bg.color_opacity ?? 100) / 100;
            if (bgType === 'gradient') {
                const stops = this._getBgGradientStops();
                const gradType = bg.gradient_type || 'radial';
                let grad;
                if (gradType === 'radial') {
                    const cx = (bg.gradient_center_x ?? 0.5) * size;
                    const cy = (bg.gradient_center_y ?? 0.5) * size;
                    const r = (bg.gradient_radius ?? 1.0) * center;
                    grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
                } else {
                    const angle = (bg.gradient_angle || 0) * Math.PI / 180;
                    const dx = Math.cos(angle) * center;
                    const dy = Math.sin(angle) * center;
                    grad = ctx.createLinearGradient(center - dx, center - dy, center + dx, center + dy);
                }
                for (const s of stops) grad.addColorStop(s.position, s.color);
                ctx.globalAlpha = colorOpacity;
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, size, size);
                ctx.globalAlpha = 1;
            } else {
                ctx.globalAlpha = colorOpacity;
                ctx.fillStyle = bg.color || '#0f172a';
                ctx.fillRect(0, 0, size, size);
                ctx.globalAlpha = 1;
            }

            const radius = a.radius / 100 * center;
            const thickness = a.thickness / 100 * radius;
            const half = center;

            const degToRad = (deg) => (deg - 90) * Math.PI / 180;
            let arcStart, arcEnd;
            if (a.arc_symmetric) {
                const ac = a.arc_center ?? 0;
                const ae = a.arc_extent ?? 135;
                arcStart = ac - ae;
                arcEnd = ac + ae;
            } else {
                arcStart = a.arc_start;
                arcEnd = a.arc_end;
            }
            const startRad = degToRad(arcStart);
            const endRad = degToRad(arcEnd);
            const sweep = endRad - startRad;

            const hexToRgba = (hex, alpha) => {
                const r = parseInt(hex.slice(1,3), 16);
                const g = parseInt(hex.slice(3,5), 16);
                const b = parseInt(hex.slice(5,7), 16);
                return `rgba(${r},${g},${b},${alpha})`;
            };

            // --- Track ---
            ctx.lineWidth = thickness;
            ctx.lineCap = a.cap_style;

            if (a.track_style === 'zones' && a.track_zones && a.track_zones.length) {
                const trackAlpha = a.track_opacity / 100;
                for (const zone of a.track_zones) {
                    const zStart = startRad + sweep * (zone.from / 100);
                    const zEnd = startRad + sweep * (zone.to / 100);
                    ctx.beginPath();
                    ctx.arc(center, center, radius, zStart, zEnd);
                    ctx.strokeStyle = hexToRgba(zone.color, trackAlpha);
                    ctx.globalAlpha = 1;
                    ctx.stroke();
                }
            } else if (a.track_style === 'gradient') {
                const sx = center + radius * Math.cos(startRad);
                const sy = center + radius * Math.sin(startRad);
                const ex = center + radius * Math.cos(endRad);
                const ey = center + radius * Math.sin(endRad);
                const grad = ctx.createLinearGradient(sx, sy, ex, ey);
                grad.addColorStop(0, a.track_gradient_start);
                grad.addColorStop(1, a.track_gradient_end);
                ctx.beginPath();
                ctx.arc(center, center, radius, startRad, endRad);
                ctx.strokeStyle = grad;
                ctx.globalAlpha = a.track_opacity / 100;
                ctx.stroke();
                ctx.globalAlpha = 1;
            } else {
                ctx.beginPath();
                ctx.arc(center, center, radius, startRad, endRad);
                ctx.strokeStyle = a.track_color;
                ctx.globalAlpha = a.track_opacity / 100;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            // --- Progress arc ---
            const progress = Math.max(0, Math.min(100, this._animProgress));
            if (a.show_progress !== false && progress > 0) {
                const progEnd = startRad + sweep * (progress / 100);
                ctx.beginPath();
                ctx.arc(center, center, radius, startRad, progEnd);
                const pc = a.progress_color;
                if (a.style === 'gradient') {
                    const gx1 = center + radius * Math.cos(startRad);
                    const gy1 = center + radius * Math.sin(startRad);
                    const gx2 = center + radius * Math.cos(progEnd);
                    const gy2 = center + radius * Math.sin(progEnd);
                    const grad = ctx.createLinearGradient(gx1, gy1, gx2, gy2);
                    grad.addColorStop(0, pc);
                    grad.addColorStop(1, a.gradient_end_color);
                    ctx.strokeStyle = grad;
                } else {
                    ctx.strokeStyle = pc;
                }
                ctx.globalAlpha = a.progress_opacity / 100;
                ctx.lineWidth = thickness;
                ctx.lineCap = a.cap_style;
                if (a.style === 'dashed') {
                    ctx.setLineDash([a.dash_length, a.dash_gap]);
                } else {
                    ctx.setLineDash([]);
                }
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.globalAlpha = 1;
            }

            // --- Tick marks ---
            if (a.tick_marks) {
                ctx.lineCap = 'butt';
                const majCount = a.major_tick_count || 10;
                if (majCount >= 2) {
                    if (a.minor_ticks && a.minor_tick_count > 0) {
                        const minInner = (a.minor_tick_inner_radius || 73) / 100 * half;
                        const minOuter = (a.minor_tick_outer_radius || 77) / 100 * half;
                        ctx.strokeStyle = a.minor_tick_color || '#555555';
                        ctx.lineWidth = a.minor_tick_width || 1;
                        const minPer = a.minor_tick_count;
                        for (let i = 0; i < majCount; i++) {
                            for (let j = 1; j <= minPer; j++) {
                                const frac = (i + j / (minPer + 1)) / majCount;
                                const angle = startRad + sweep * frac;
                                ctx.beginPath();
                                ctx.moveTo(center + minInner * Math.cos(angle), center + minInner * Math.sin(angle));
                                ctx.lineTo(center + minOuter * Math.cos(angle), center + minOuter * Math.sin(angle));
                                ctx.stroke();
                            }
                        }
                    }
                    const majInner = (a.major_tick_inner_radius || 72) / 100 * half;
                    const majOuter = (a.major_tick_outer_radius || 78) / 100 * half;
                    ctx.strokeStyle = a.major_tick_color || '#888888';
                    ctx.lineWidth = a.major_tick_width || 2;
                    for (let i = 0; i <= majCount; i++) {
                        const angle = startRad + sweep * (i / majCount);
                        ctx.beginPath();
                        ctx.moveTo(center + majInner * Math.cos(angle), center + majInner * Math.sin(angle));
                        ctx.lineTo(center + majOuter * Math.cos(angle), center + majOuter * Math.sin(angle));
                        ctx.stroke();
                    }
                }
            }

            // --- Hand ---
            const handAngle = startRad + sweep * (progress / 100);
            if (a.show_hand) {
                const tipR = (a.hand_length || 80) / 100 * half;
                const tailR = (a.hand_tail ?? 10) / 100 * half;
                const baseW = (a.hand_width || 3) / 100 * radius;
                const cosA = Math.cos(handAngle);
                const sinA = Math.sin(handAngle);
                const cosP = Math.cos(handAngle + Math.PI / 2);
                const sinP = Math.sin(handAngle + Math.PI / 2);
                const tipX = center + tipR * cosA;
                const tipY = center + tipR * sinA;
                const tailX = center - tailR * cosA;
                const tailY = center - tailR * sinA;

                ctx.fillStyle = a.hand_color || '#ffffff';
                ctx.strokeStyle = a.hand_color || '#ffffff';

                if (a.hand_style === 'line') {
                    ctx.lineWidth = Math.max(baseW, 2);
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(tailX, tailY);
                    ctx.lineTo(tipX, tipY);
                    ctx.stroke();
                } else if (a.hand_style === 'needle') {
                    const shaftW = Math.max(baseW * 0.3, 1);
                    const diamondW = Math.max(baseW * 1.2, 2);
                    const diamondLen = tipR * 0.06;
                    ctx.lineWidth = shaftW;
                    ctx.lineCap = 'butt';
                    const dbx = center + (tipR - diamondLen) * cosA;
                    const dby = center + (tipR - diamondLen) * sinA;
                    ctx.beginPath();
                    ctx.moveTo(tailX, tailY);
                    ctx.lineTo(dbx, dby);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(tipX, tipY);
                    ctx.lineTo(dbx + diamondW * cosP, dby + diamondW * sinP);
                    ctx.lineTo(center + (tipR - diamondLen * 2) * cosA, center + (tipR - diamondLen * 2) * sinA);
                    ctx.lineTo(dbx - diamondW * cosP, dby - diamondW * sinP);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(tipX, tipY);
                    ctx.lineTo(tailX + baseW * cosP, tailY + baseW * sinP);
                    ctx.lineTo(tailX - baseW * cosP, tailY - baseW * sinP);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            // --- Hand center dot ---
            if (a.show_hand && a.hand_center_dot) {
                const dotR = (a.hand_center_dot_radius || 4) / 100 * half;
                ctx.beginPath();
                ctx.arc(center, center, dotR, 0, Math.PI * 2);
                ctx.fillStyle = a.hand_center_dot_color || '#333333';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(center, center, dotR, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // --- Label ---
            if (this.timer.show_label && this.timer.label) {
                const labelSize = this.timer.label_font_size ?? (a.label_font_size || Math.round(size * 0.045));
                const labelOffY = (this.timer.label_offset_y ?? a.label_offset_y ?? 8);
                const labelY = center + labelOffY / 100 * radius;
                ctx.fillStyle = this.timer.label_color ?? a.label_color ?? '#888888';
                ctx.font = `${labelSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.timer.label, center, labelY);
            }

            // --- Remaining time (shown when show_time enabled) ---
            if (this.timer.show_time !== false) {
                const timeStr = this.formatTime(this.timer.remaining);
                const timeSize = this.timer.time_font_size ?? (a.value_font_size || Math.round(size * 0.07));
                const timeOffY = (this.timer.time_offset_y ?? a.value_offset_y ?? 12);
                const timeY = center + timeOffY / 100 * radius;
                ctx.fillStyle = this.timer.time_color ?? a.value_color ?? '#ffffff';
                ctx.font = `bold ${timeSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(timeStr, center, timeY);
            }

            ctx.restore();
        },

        _getBgGradientStops() {
            if (!this._dialTheme) return [];
            const bg = this._dialTheme.background;
            if (bg.color_stops && bg.color_stops.length >= 2) return bg.color_stops;
            const colors = bg.colors || ['#0f172a', '#1e293b'];
            return colors.map((c, i) => ({ color: c, position: i / Math.max(colors.length - 1, 1) }));
        },
    };
}
</script>
